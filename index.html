<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>User Information Form</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

  <h1>User Details Form</h1>

  <form>

    <label>Full Name</label><br>
    <input type="text" id="name" placeholder="Enter Your Name"><br><br>

    <label>Email Address</label><br>
    <input type="text" id="email" placeholder="Enter Email"><br><br>

    <label>Phone Number (Hidden)</label><br>
    <input type="password" id="contact"><br><br>

    <label>Gender</label><br>

    <input type="radio" id="female" name="gender" value="Female">Female<br>

    <input type="radio" id="male" name="gender" value="Male">Male<br><br>

    <label>Favourite Hobbies</label><br>

    <input type="checkbox" value="Reading">Reading<br>

    <input type="checkbox" value="Music">Music<br><br>

    <input type="submit" value="Register">

  </form>

</body>

</html>
